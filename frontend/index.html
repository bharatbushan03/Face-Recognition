<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face ID Solutions</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 5a2 2 0 0 1 2-2h2"></path>
                    <path d="M19 5a2 2 0 0 0-2-2h-2"></path>
                    <path d="M5 19a2 2 0 0 0 2 2h2"></path>
                    <path d="M19 19a2 2 0 0 1-2 2h-2"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M12 16v.01"></path>
                </svg>
                <h1>FaceID</h1>
            </div>
        </header>

        <main>
            <!-- Toast Notification Container -->
            <div id="toast-container" class="toast-container"></div>

            <section class="camera-section">
                <div class="video-container">
                    <video id="videoElement" autoplay playsinline></video>
                    <!-- Overlay for scanning effect -->
                    <div class="scan-overlay"></div>
                </div>
                <canvas id="canvasElement" style="display:none;"></canvas>
            </section>

            <section class="controls-section">
                <!-- Recognition Mode Details -->
                <div class="status-panel" id="recognition-status">
                    <h2>Ready to Recognize</h2>
                    <p>Align your face within the frame and click Recognize</p>
                    <button class="btn primary-btn" id="btn-recognize">
                        <span class="btn-text">Recognize Face</span>
                        <div class="loader" style="display: none;"></div>
                    </button>
                    <div id="recognition-result"></div>
                </div>

                <!-- Registration Mode Details -->
                <div class="registration-panel">
                    <h3>New User?</h3>
                    <div class="input-group">
                        <input type="text" id="username" placeholder="Enter your name" autocomplete="off">
                    </div>
                    <button class="btn secondary-btn" id="btn-register">
                        <span class="btn-text">Register Face</span>
                        <div class="loader" style="display: none;"></div>
                    </button>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
